# Sequential MNIST — feedforward control (snn.Leaky).
# Spec: docs/design/2026-05-23-sequential-mnist.md

run_name: feedforward
notes: "EXP-011 feedforward control — plain Leaky, H=128, beta=0.9, identical to recurrent variant except no W_rec."
tags: [exp-011, sequential-mnist, feedforward, week-7]
experiment_id: EXP-011

seed: 42
dataset: mnist
batch_size: 128
data_root: ./data

arch: sequential_snn
num_inputs: 28
hidden_size: 128
num_outputs: 10
recurrent: false
readout_window: 4

beta: 0.9
threshold: 1.0
reset_mechanism: subtract

num_steps: 28
sequential: true
encoding: direct
gain: 1.0

optimizer: adam
lr: 0.0003
weight_decay: 0.0
epochs: 5

tracker: tensorboard
log_interval: 50
