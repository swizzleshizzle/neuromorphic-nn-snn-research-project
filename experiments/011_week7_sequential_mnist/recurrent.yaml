# Sequential MNIST — recurrent hidden layer (snn.RLeaky, all_to_all=True).
# Spec: docs/design/2026-05-23-sequential-mnist.md

run_name: recurrent
notes: "EXP-011 recurrent — RLeaky all_to_all=True, H=128, beta=0.9, 28-step BPTT."
tags: [exp-011, sequential-mnist, recurrent, week-7]
experiment_id: EXP-011

seed: 42
dataset: mnist
batch_size: 128
data_root: ./data

arch: sequential_snn
num_inputs: 28
hidden_size: 128
num_outputs: 10
recurrent: true
readout_window: 4

beta: 0.9
threshold: 1.0
reset_mechanism: subtract

num_steps: 28
sequential: true
encoding: direct
gain: 1.0

optimizer: adam
lr: 0.0003
weight_decay: 0.0
epochs: 5

tracker: tensorboard
log_interval: 50
